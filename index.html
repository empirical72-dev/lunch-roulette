<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>점심 룰렛 🎰</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>점심 룰렛 🎰</h1>

  <div class="settings">
    <h3>참가자 입력</h3>
    <input type="text" id="participantInput" placeholder="참가자 이름 입력">
    <button onclick="addParticipant()">추가</button>
    <div id="participantList"></div>

    <h3>룰렛 항목 입력</h3>
    <input type="text" id="optionInput" placeholder="룰렛 항목 입력 (예: 점심값)">
    <button onclick="addOption()">추가</button>
    <div id="optionList"></div>

    <button onclick="resetRoulette()">리셋</button>
  </div>

  <div class="roulette-container">
    <canvas id="roulette" width="400" height="400"></canvas>
    <div class="pointer"></div>
    <button class="spin-btn" onclick="spinRoulette()">돌리기!</button>
  </div>

  <div id="result"></div>
  <h2>전체 결과</h2>
  <ul id="history"></ul>

  <script src="script.js"></script>
</body>
</html>
