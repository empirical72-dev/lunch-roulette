<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>점심 룰렛 🎰</title>
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <h1>점심 룰렛 🎰</h1>

  <div class="settings">
    <h3>참가자 입력</h3>
    <input type="text" id="participantInput" placeholder="참가자 이름 입력">
    <button onclick="addParticipant()">추가</button>
    <ul id="participantList"></ul>

    <h3>룰렛 항목 입력</h3>
    <input type="text" id="optionName" placeholder="항목 이름 (예: 점심값)">
    <input type="number" id="optionCount" placeholder="개수 (예: 2)" min="1">
    <button onclick="addOption()">추가</button>
    <ul id="optionList"></ul>

    <button onclick="resetRoulette()">리셋</button>
  </div>

  <div class="roulette-container">
    <canvas id="roulette" width="400" height="400"></canvas>
    <div class="pointer"></div>
    <button class="spin-btn" onclick="spinRoulette()">돌리기!</button>
  </div>

  <div id="result"></div>
  <h2>전체 결과</h2>
  <table id="historyTable">
    <thead>
      <tr><th>참가자</th><th>결과</th></tr>
    </thead>
    <tbody id="history"></tbody>
  </table>

  <script src="script.js?v=8"></script>
</body>
</html>
