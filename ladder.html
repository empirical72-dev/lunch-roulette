<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사다리 게임 🎲</title>
  <link rel="stylesheet" href="ladder.css">
</head>
<body>
  <h1>사다리 게임 🎲</h1>

  <div>
    <h3>참가자 입력</h3>
    <input type="text" id="participantInput" placeholder="참가자 이름">
    <button onclick="addParticipant()">추가</button>
    <ul id="participantList"></ul>

    <h3>항목 입력</h3>
    <input type="text" id="optionInput" placeholder="항목 이름">
    <button onclick="addOption()">추가</button>
    <ul id="optionList"></ul>

    <button onclick="startLadder()">사다리 타기!</button>
  </div>

  <div id="result"></div>

  <script src="ladder.js"></script>
</body>
</html>
